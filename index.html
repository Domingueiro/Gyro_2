<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Zelador Cívico — Giroscópio v1.0 (Restaurado)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e8dcc8; color: #2a2e3a; font-family: 'Space Mono', monospace;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 14px;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 70% 50% at 50% 40%, #f5edd8 0%, transparent 70%),
                repeating-linear-gradient(0deg, transparent, transparent 39px, #d4c8b0 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, #d4c8b0 40px);
    background-size: auto, 40px 40px, 40px 40px; pointer-events: none; z-index: 0;
  }
  .wrap {
    position: relative; z-index: 1; width: min(680px, 98vw); aspect-ratio: 1;
    background: #f0e6d0; border: 1px solid #c8b898; border-radius: 6px; overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .legend {
    position: relative; z-index: 1; width: min(680px, 98vw); background: #f0e6d0;
    border: 1px solid #c8b898; border-radius: 4px; padding: 10px 16px; font-size: 0.53rem;
    color: #7a6e5a; letter-spacing: 0.09em; line-height: 1.8;
  }
  .legend span { color: #000000; font-weight: bold; }
</style>
</head>
<body>

<div class="wrap"><canvas id="c" width="680" height="680"></canvas></div>
<div class="legend"><span>SISTEMA DE BINÁRIO REATIVADO</span> · Trajetória e massas integradas · Labels em Preto · Z Superior p/ Baixo.</div>

<script>
const L = 1.0, BH = 0.015 * L, W = 680, Q = 340;
const cv = document.getElementById('c'), ctx = cv.getContext('2d');

// Projeções
const pISO = (wx, wy, wz, S, cx, cy) => [cx + S*(0.866*wx - 0.866*wz), cy + S*(0.25*wx - wy + 0.25*wz)];
const pX   = (wx, wy, wz, S, cx, cy) => [cx - S*wz, cy - S*wy];
const pY   = (wx, wy, wz, S, cx, cy) => [cx + S*wx, cy + S*wz]; // Z p/ Baixo
const pZ   = (wx, wy, wz, S, cx, cy) => [cx + S*wx, cy - S*wy];

// Helpers
function poly(pts, fill, stroke, lw=1, alpha=1) {
  ctx.save(); ctx.globalAlpha=alpha; ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
  pts.forEach(p => ctx.lineTo(p[0], p[1])); ctx.closePath();
  if(fill){ ctx.fillStyle=fill; ctx.fill(); }
  if(stroke){ ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke(); } ctx.restore();
}

function txt(t, x, y) {
  ctx.font = "bold 11px 'Space Mono'"; ctx.fillStyle = '#000000'; ctx.fillText(t, x, y);
}

// Geometria
const CH = 0.6*L, CS = 0.1*L, R_OUT = (L/2-CS)-0.025*L;
let spin = 45; // Ângulo fixo para apresentação

function drawBinary(proj, S, cx, cy) {
  const p = (x, y, z) => proj(x, y, z, S, cx, cy);
  const rad = spin * Math.PI / 180;

  // Posições 3D das Massas
  const M1 = [R_OUT * Math.sin(rad), CH + R_OUT * Math.cos(rad), 0];
  const M2 = [-R_OUT * Math.sin(rad), CH - R_OUT * Math.cos(rad), 0];
  
  // Pontos de Engaste (Trajetória)
  const E1 = [0, CH, -R_OUT], E2 = [0, CH, R_OUT];

  const m1p = p(...M1), m2p = p(...M2), e1p = p(...E1), e2p = p(...E2);

  // 1. Desenho da Trajetória (Linhas de Tensão)
  ctx.save(); ctx.setLineDash([3, 3]); ctx.strokeStyle = "#8a9ab0"; ctx.globalAlpha = 0.5;
  [[m1p, e1p], [m1p, e2p], [m2p, e1p], [m2p, e2p]].forEach(line => {
    ctx.beginPath(); ctx.moveTo(line[0][0], line[0][1]); ctx.lineTo(line[1][0], line[1][1]); ctx.stroke();
  }); ctx.restore();

  // 2. Haste de Conexão
  ctx.beginPath(); ctx.moveTo(m1p[0], m1p[1]); ctx.lineTo(m2p[0], m2p[1]);
  ctx.strokeStyle = "#4a5a7a"; ctx.lineWidth = 3; ctx.stroke();

  // 3. Massas (Esferas)
  [m1p, m2p].forEach(pt => {
    ctx.beginPath(); ctx.arc(pt[0], pt[1], 0.03*L*S, 0, Math.PI*2);
    ctx.fillStyle = "#8a6a10"; ctx.strokeStyle = "#e0b050"; ctx.lineWidth = 2; ctx.fill(); ctx.stroke();
  });
}

function drawScene(proj, scale, cx, cy, title) {
  // Eixos
  const O = proj(0,0,0, scale, cx, cy);
  const ex = proj(0.6,0,0, scale, cx, cy), ey = proj(0,0.6,0, scale, cx, cy), ez = proj(0,0,0.6, scale, cx, cy);
  ctx.strokeStyle="#999"; ctx.beginPath(); ctx.moveTo(O[0],O[1]); ctx.lineTo(ex[0],ex[1]); ctx.stroke();
  txt("X", ex[0]+5, ex[1]); txt("Y", ey[0]+5, ey[1]); txt("Z", ez[0]+5, ez[1]);
  
  // Base e Coluna (Simp.)
  const half = L/2;
  const b1 = proj(half, 0, half, scale, cx, cy), b2 = proj(-half, 0, half, scale, cx, cy), 
        b3 = proj(-half, 0, -half, scale, cx, cy), b4 = proj(half, 0, -half, scale, cx, cy);
  poly([b1, b2, b3, b4], "#b0a898", "#404040", 1, 0.8);

  // O Binário (O que faltava)
  drawBinary(proj, scale, cx, cy);
  
  ctx.font = "bold 9px 'Space Mono'"; ctx.fillStyle = "#000"; ctx.fillText(title, 10, 20);
}

function main() {
  ctx.clearRect(0, 0, W, W);
  drawScene(pISO, 115, Q/2, Q/2+20, "PERSPECTIVA ISO");
  ctx.save(); ctx.translate(Q, 0); drawScene(pX, 115, Q/2, Q/2, "VISTA X (YZ)"); ctx.restore();
  ctx.save(); ctx.translate(0, Q); drawScene(pY, 115, Q/2, Q/2, "VISTA Y (XZ)"); ctx.restore();
  ctx.save(); ctx.translate(Q, Q); drawScene(pZ, 115, Q/2, Q/2, "VISTA Z (XY)"); ctx.restore();
  
  ctx.strokeStyle = '#a89878'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, Q); ctx.lineTo(W, Q); ctx.moveTo(Q, 0); ctx.lineTo(Q, W); ctx.stroke();
}

main();
</script>
</body>
</html>
