// MATEMÁTICA DE PROJEÇÃO
// ———————————————————————————————————————————————————————
function rotateY(x, y, z, deg) {
  const rad = deg * Math.PI / 180;
  const c = Math.cos(rad), s = Math.sin(rad);
  return [x * c + z * s, y, -x * s + z * c];
}

// Projetores (Recebem coordenadas MUNDO e cospitem TELA)

  iso: (x, y, z, S, cx, cy) => {
    const [rx, ry, rz] = rotateY(x, y, z, globalRotationY);
    return [cx + S * (0.866 * rx - 0.866 * rz), cy + S * (0.25 * rx - ry + 0.25 * rz)];
  },
  front: (x, y, z, S, cx, cy) => { // Vista X (Plano YZ)
    const [rx, ry, rz] = rotateY(x, y, z, globalRotationY);
    return [cx - S * rz, cy - S * ry];
  },
  top: (x, y, z, S, cx, cy) => { // Vista Y (Plano XZ)
    const [rx, ry, rz] = rotateY(x, y, z, globalRotationY);
    return [cx + S * rx, cy - S * rz];
  },
  side: (x, y, z, S, cx, cy) => { // Vista Z (Plano XY)
    const [rx, ry, rz] = rotateY(x, y, z, globalRotationY);
    return [cx + S * rx, cy - S * ry];
  }
};
