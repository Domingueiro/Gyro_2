<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Giroscópio Físico - Domingueiro</title>
    <style>
        body { background: #1a1a1a; color: #fbbf24; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        canvas { background: #000; border: 2px solid #fbbf24; box-shadow: 0 0 20px rgba(251, 191, 36, 0.2); cursor: crosshair; }
        .controls { margin-top: 15px; display: flex; gap: 20px; background: #262626; padding: 15px; border-radius: 8px; border: 1px solid #404040; }
        .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        input[type=range] { accent-color: #fbbf24; width: 200px; }
    </style>
</head>
<body>

    <div style="margin-bottom: 10px; font-weight: bold; letter-spacing: 2px;">ZELADOR CÍVICO: SENSOR INERCIAL V1.0</div>

    <canvas id="canvas" width="700" height="700"></canvas>

    <div class="controls">
        <div style="text-align: center;">
            <div class="label">Rotação da Base (Y)</div>
            <input type="range" id="baseSlider" min="-45" max="45" step="1" value="0">
            <div id="baseVal">0°</div>
        </div>
        <div style="text-align: center; opacity: 0.6;">
            <div class="label">Torção Reativa (Anel)</div>
            <div id="ringVal" style="font-size: 18px; font-weight: bold; color: #fbbf24;">0.0°</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('baseSlider');
    
    // Constantes do Modelo (L = 200 pixels para visibilidade)
    const L = 200;
    const CH = 0.6 * L;
    const SR = 0.38 * L;
    const MR = 8;
    const Q = 350; // Quadrante

    let time = 0;
    let baseAngle = 0;
    let ringAngle = 0;
    let spinAngle = 0;

    function project(x, y, z, type, cx, cy) {
        const S = 1.2; // Escala de visualização
        
        // 1. Torção do Anel (Eixo X na altura CH)
        const ra = ringAngle * Math.PI / 180;
        let y1 = (y - CH) * Math.cos(ra) - z * Math.sin(ra) + CH;
        let z1 = (y - CH) * Math.sin(ra) + z * Math.cos(ra);
        let x1 = x;

        // 2. Rotação da Base (Eixo Y)
        const rb = baseAngle * Math.PI / 180;
        let rx = x1 * Math.cos(rb) + z1 * Math.sin(rb);
        let ry = y1;
        let rz = -x1 * Math.sin(rb) + z1 * Math.cos(rb);

        if (type === 'ISO') {
            return [cx + S * (0.866 * rx - 0.866 * rz), cy + S * (0.25 * rx - ry + 0.25 * rz)];
        } else if (type === 'FRENTE') {
            return [cx - S * rz, cy - S * ry];
        } else if (type === 'TOPO') {
            return [cx + S * rx, cy - S * rz];
        } else { // LADO
            return [cx + S * rx, cy - S * ry];
        }
    }

    function drawPart(type, cx, cy, label) {
        const p = (x, y, z) => project(x, y, z, type, cx, cy);

        // Grid de base
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
        for(let i=-1; i<=1; i+=0.5) {
            let p1 = p(i*L/2, 0, -L/2), p2 = p(i*L/2, 0, L/2);
            ctx.beginPath(); ctx.moveTo(...p1); ctx.lineTo(...p2); ctx.stroke();
        }

        // Coluna (Roxa)
        const c1 = p(0.45*L, 0, 0), c2 = p(0.45*L, CH, 0);
        ctx.strokeStyle = '#a855f7'; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(...c1); ctx.lineTo(...c2); ctx.stroke();

        // Semi-Anel (Azul Inercial)
        ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3;
        ctx.beginPath();
        for(let i=0; i<=30; i++) {
            let th = -Math.PI/2 + (i/30)*Math.PI;
            let pt = p(SR * Math.cos(th), CH, SR * Math.sin(th));
            i === 0 ? ctx.moveTo(...pt) : ctx.lineTo(...pt);
        }
        ctx.stroke();

        // Binário (Haste e Massas)
        const sa = spinAngle * Math.PI / 180;
        const m1_coord = [SR * Math.sin(sa), CH + SR * Math.cos(sa), 0];
        const m2_coord = [-SR * Math.sin(sa), CH - SR * Math.cos(sa), 0];
        const m1 = p(...m1_coord), m2 = p(...m2_coord);

        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(...m1); ctx.lineTo(...m2); ctx.stroke();

        [m1, m2].forEach(m => {
            ctx.fillStyle = '#fbbf24'; ctx.beginPath();
            ctx.arc(m[0], m[1], MR, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#000'; ctx.stroke();
        });

        // Nome da Vista
        ctx.fillStyle = '#666'; ctx.font = '10px monospace';
        ctx.fillText(label, cx - Q/2 + 10, cy - Q/2 + 20);
    }

    function loop() {
        ctx.clearRect(0, 0, 700, 700);
        
        // Atualizar Ângulos
        time += 0.03;
        spinAngle = Math.sin(time) * 30; // Movimento pendular
        baseAngle = parseFloat(slider.value);
        document.getElementById('baseVal').innerText = baseAngle + "°";

        // LEI DE MOVIMENTO: Torção do anel para manter massas em Z=0
        ringAngle = -baseAngle * Math.cos(spinAngle * Math.PI / 180);
        document.getElementById('ringVal').innerText = ringAngle.toFixed(1) + "°";

        // Divisórias
        ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(Q,0); ctx.lineTo(Q,700); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,Q); ctx.lineTo(700,Q); ctx.stroke();

        // Renderizar Quadrantes
        drawPart('ISO', Q/2, Q/2, "ISO 3D");
        drawPart('FRENTE', Q + Q/2, Q/2, "X-VIEW (FRENTE)");
        drawPart('TOPO', Q/2, Q + Q/2, "Y-VIEW (PLANTA)");
        drawPart('LADO', Q + Q/2, Q + Q/2, "Z-VIEW (PERFIL)");

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
