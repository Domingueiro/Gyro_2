<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giroscópio — Rotação de Conjunto (Eixo Y)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  body {
    background:#e8dcc8; color:#2a2e3a;
    font-family:'Space Mono',monospace;
    display:flex; flex-direction:column; align-items:center; padding:20px; gap:15px;
  }

  .wrap {
    position:relative; width:min(680px, 95vw); aspect-ratio:1;
    background:#f0e6d0; border:1px solid #c8b898; border-radius:6px;
  }
  canvas { display:block; width:100%; height:100%; }

  .ui {
    display:flex; gap:10px; width:min(680px, 95vw);
  }
  button {
    flex:1; font-family:'Space Mono',monospace; font-size:0.7rem; font-weight:700;
    padding:12px; border:1.5px solid #c8b898; background:#f5edd8;
    color:#2a2e3a; border-radius:4px; cursor:pointer;
  }
  button:hover { background:#ede1c5; }
  button:active { background:#c8b898; color:white; }

  .info {
    font-size:0.6rem; color:#7a6e5a; text-transform:uppercase; letter-spacing:0.1em;
  }
</style>
</head>
<body>

<div class="info">Rotação Atual (Y): <span id="valY">0</span>°</div>

<div class="wrap"><canvas id="c" width="680" height="680"></canvas></div>

<div class="ui">
  <button onclick="rotateY(-15)">↺ -15° (Sentido Horário)</button>
  <button onclick="rotateY(15)">↻ +15° (Sentido Anti-horário)</button>
</div>

<script>
// ———————————————————————————————————————————————————————
// CONSTANTES TÉCNICAS (Skill Domingueiro)
// ———————————————————————————————————————————————————————
const L = 1.0;
const CH = 0.6 * L;       // Altura da coluna
const SR_OUT = 0.375 * L; // Raio do semi-anel
const MASS_R = 0.03 * L;  // Raio das massas
const W = 680, Q = 340;   // Canvas e Quadrantes

const cv = document.getElementById('c'), ctx = cv.getContext('2d');

// Estado
let globalRotationY = 0;

// ———————————————————————————————————————————————————————
// PROJEÇÕES (ISO, X, Y, Z)
// ———————————————————————————————————————————————————————
function rotatePointY(x, y, z, deg) {
  const rad = deg * Math.PI / 180;
  const c = Math.cos(rad), s = Math.sin(rad);
  return [x * c + z * s, y, -x * s + z * c];
}

function pISO(x, y, z, S, cx, cy) {
  const [rx, ry, rz] = rotatePointY(x, y, z, globalRotationY);
  return [cx + S * (0.866 * rx - 0.866 * rz), cy + S * (0.25 * rx - ry + 0.25 * rz)];
}

function pX(x, y, z, S, cx, cy) {
  const [rx, ry, rz] = rotatePointY(x, y, z, globalRotationY);
  return [cx - S * rz, cy - S * ry];
}

function pY(x, y, z, S, cx, cy) {
  const [rx, ry, rz] = rotatePointY(x, y, z, globalRotationY);
  return [cx + S * rx, cy - S * rz];
}

function pZ(x, y, z, S, cx, cy) {
  const [rx, ry, rz] = rotatePointY(x, y, z, globalRotationY);
  return [cx + S * rx, cy - S * ry];
}

// ———————————————————————————————————————————————————————
// FUNÇÕES DE DESENHO
// ———————————————————————————————————————————————————————
function drawLine(p1, p2, col, lw = 1, dash = []) {
  ctx.save(); ctx.beginPath(); ctx.setLineDash(dash);
  ctx.moveTo(p1[0], p1[1]); ctx.lineTo(p2[0], p2[1]);
  ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.stroke(); ctx.restore();
}

  const p = (x, y, z) => proj(x, y, z, S, cx, cy);

  ctx.fillStyle = "rgba(176, 168, 152, 0.5)"; ctx.beginPath();
