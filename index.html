<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Montagem Giroscópio — Base + Eixo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  body {
    background:#e8dcc8; color:#2a2e3a;
    font-family:'Space Mono',monospace;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:16px; gap:14px;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 40%,#f5edd8 0%,transparent 70%),
      repeating-linear-gradient(0deg,transparent,transparent 39px,#d4c8b0 40px),
      repeating-linear-gradient(90deg,transparent,transparent 39px,#d4c8b0 40px);
    background-size:auto,40px 40px,40px 40px;
    pointer-events:none; z-index:0;
  }

  header { position:relative; z-index:1; text-align:center; }
  header h1 {
    font-family:'Crimson Pro',serif; font-weight:300;
    font-size:clamp(0.9rem,2.5vw,1.25rem);
    color:#1a1e2a; letter-spacing:0.12em; text-transform:uppercase;
  }
  header p { font-size:0.54rem; color:#7a6e5a; margin-top:4px; letter-spacing:0.12em; }

  .wrap {
    position:relative; z-index:1;
    width:min(680px,98vw); aspect-ratio:1;
    background:#f0e6d0; border:1px solid #c8b898;
    border-radius:6px; overflow:hidden;
  }
  canvas { display:block; width:100%; height:100%; }

  .legend {
    position:relative; z-index:1;
    width:min(680px,98vw);
    background:#f0e6d0; border:1px solid #c8b898;
    border-radius:4px; padding:8px 14px;
    font-size:0.53rem; color:#7a6e5a;
    letter-spacing:0.09em; line-height:1.9;
  }
  .legend span { color:#2a2e3a; }
</style>
</head>
<body>

<header>
  <h1>Montagem Giroscópio — Binário + Semi-anel</h1>
  <p>Plano X'Y · Semi-anel no plano Z"X" · Pendular ±30°</p>
</header>

<div class="wrap"><canvas id="c" width="680" height="680"></canvas></div>

<div style="position:relative;z-index:1;display:flex;gap:8px;margin-top:4px;">
  <button id="btnPause" onclick="togglePause()"
    style="font-family:'Space Mono',monospace;font-size:0.58rem;padding:7px 18px;
    border:1.5px solid #c8b898;background:#f0e6d0;color:#2a2e3a;border-radius:3px;cursor:pointer;flex:1;">
    ⏸ Pausar
  </button>
  <button onclick="reset()"
    style="font-family:'Space Mono',monospace;font-size:0.58rem;padding:7px 18px;
    border:1.5px solid #c8b898;background:#f0e6d0;color:#2a2e3a;border-radius:3px;cursor:pointer;flex:1;">
    ⟲ Reset
  </button>
</div>
<div style="position:relative;z-index:1;background:#f0e6d0;border:1px solid #c8b898;
  border-radius:4px;padding:8px 14px;font-family:'Space Mono',monospace;font-size:0.55rem;color:#7a6e5a;">
  <label style="display:block;margin-bottom:4px;letter-spacing:0.08em;text-transform:uppercase;">
    Torção da base em Y: <span id="lblBase">0.0</span>°
  </label>
  <input type="range" min="-45" max="45" step="0.5" value="0"
    style="width:100%;accent-color:#5a6a8a;"
    oninput="baseAngle=parseFloat(this.value);document.getElementById('lblBase').textContent=parseFloat(this.value).toFixed(1);">
</div>

<div class="legend">
  <span>L = 1.0</span> · Binário pendular −30°→0°→−30° · passo 0.5°/frame ·
  Massas sempre em z=0 (plano X'Y, azul) ·
  <span>ISO 3D</span> · <span>Vista←X/YZ</span> · <span>Vista↓Y/XZ</span> · <span>Vista◉Z/XY</span>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════════════
const L   = 1.0;
const BH  = 0.01 * L;    // espessura da base

// Cores
const CX='#e05252', CY='#52c0e0', CZ='#7de052';
const CBASE_TOP ='#b0a898';   // face superior da base
const CBASE_SIDE='#8a8078';   // faces laterais
const CBASE_BOT ='#6a6058';   // face inferior
const CAXIS ='#c06080';       // eixo vertical
const CAXIS2='#a04060';

// ═══════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const W=680, Q=340;

// ═══════════════════════════════════════════════════════
// PROJEÇÕES  (S=escala, cx,cy=origem no quadrante)
// ═══════════════════════════════════════════════════════
// Isométrica: X→direita-baixo, Y→cima, Z→esquerda-baixo
function pISO(wx,wy,wz,S,cx,cy){
  return[
    cx + S*(0.866*wx - 0.866*wz),
    cy + S*(0.25*wx  - wy       + 0.25*wz)
  ];
}
// Vista de X (plano YZ): H=−Z, V=Y
function pX(wx,wy,wz,S,cx,cy){ return[cx - S*wz, cy - S*wy]; }
// Vista de Y (plano XZ): H=X, V=−Z
function pY(wx,wy,wz,S,cx,cy){ return[cx + S*wx,  cy - S*wz]; }
// Vista de Z (plano XY): H=X, V=Y
function pZ(wx,wy,wz,S,cx,cy){ return[cx + S*wx,  cy - S*wy]; }

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function poly(pts, fill, stroke, lw=1, alpha=1){
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath();
  ctx.moveTo(pts[0][0],pts[0][1]);
  pts.forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();}
  ctx.restore();
}

function dline(x1,y1,x2,y2,col,lw=1.2,dash=[5,4]){
  ctx.save();ctx.setLineDash(dash);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();ctx.restore();
}

function arr(x1,y1,x2,y2,col,lw=2,hl=8){
  const dx=x2-x1,dy=y2-y1,l=Math.hypot(dx,dy);if(l<2)return;
  const nx=dx/l,ny=dy/l;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);
  ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hl*(nx-ny*0.4),y2-hl*(ny+nx*0.4));
  ctx.lineTo(x2-hl*(nx+ny*0.4),y2-hl*(ny-nx*0.4));
  ctx.closePath();ctx.fillStyle=col;ctx.fill();
}

function txt(t,x,y,col,sz=9,bold=false){
  ctx.font=`${bold?'bold ':''}${sz}px 'Space Mono'`;
  ctx.fillStyle=col;ctx.fillText(t,x,y);
}

function grid(x0,y0){
  ctx.save();ctx.strokeStyle='#d0c4ae';ctx.lineWidth=0.5;
  const s=Q/6;
  for(let i=0;i<=6;i++){
    ctx.beginPath();ctx.moveTo(x0+i*s,y0);ctx.lineTo(x0+i*s,y0+Q);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x0,y0+i*s);ctx.lineTo(x0+Q,y0+i*s);ctx.stroke();
  }
  ctx.restore();
}

function qtitle(t){
  ctx.font="bold 8px 'Space Mono'";ctx.fillStyle='#7a6e5a';ctx.fillText(t,8,14);
}

// ═══════════════════════════════════════════════════════
// ROTAÇÃO EM TORNO DE Y (para a base girar sobre Y)
// Aplica baseAngle (graus) a um ponto mundo antes de projetar
// ═══════════════════════════════════════════════════════
function rotateY(wx,wy,wz,deg){
  const r=deg*Math.PI/180;
  const c=Math.cos(r), s=Math.sin(r);
  return [wx*c+wz*s, wy, -wx*s+wz*c];
}

// Projector que aplica rotação de base antes de projetar
// Retorna função com mesma assinatura de pISO/pX/pY/pZ
function mkProj(baseProj, S, cx, cy){
  return function(wx,wy,wz,_S,_cx,_cy){
    const [rx,ry,rz]=rotateY(wx,wy,wz,baseAngle);
    return baseProj(rx,ry,rz, S, cx, cy);
  };
}

// ═══════════════════════════════════════════════════════
// EIXOS ORTOGONAIS (comuns a todas as vistas)
// ═══════════════════════════════════════════════════════
function drawAxes(proj,S,cx,cy){
  const p=(x,y,z)=>proj(x,y,z,S,cx,cy);
  const O=p(0,0,0);
  const ext=0.65*L;

  // X
  dline(...p(-ext,0,0),...O,CX,1.2);
  arr(...O,...p(ext,0,0),CX,2,8);
  txt('X',...p(ext+0.04,0,0),CX,10,true);

  // Y
  dline(...p(0,-0.25*L,0),...O,CY,1.2);
  arr(...O,...p(0,ext,0),CY,2,8);
  txt('Y',...p(0,ext+0.04,0),CY,10,true);

  // Z
  dline(...p(0,0,-ext*0.5),...O,CZ,1.2);
  arr(...O,...p(0,0,ext),CZ,2,8);
  txt('Z',...p(0,0,ext+0.04),CZ,10,true);

  // Origem
  ctx.beginPath();ctx.arc(O[0],O[1],3,0,Math.PI*2);
  ctx.fillStyle='#8a7a6a';ctx.fill();
}

// ═══════════════════════════════════════════════════════
// BASE (paralelepípedo L×0.01L×L, de y=−BH a y=0)
// Vértices: ±L/2 em X e Z, de y=−BH a y=0
// ═══════════════════════════════════════════════════════
function drawBase(proj,S,cx,cy){
  const p=(x,y,z)=>proj(x,y,z,S,cx,cy);
  const h=L/2;  // metade do lado
  const y0=0, y1=-BH;

  // 8 vértices
  const TRF=p( h, y0,  h);  // top right front
  const TLF=p(-h, y0,  h);  // top left  front
  const TLB=p(-h, y0, -h);  // top left  back
  const TRB=p( h, y0, -h);  // top right back
  const BRF=p( h, y1,  h);
  const BLF=p(-h, y1,  h);
  const BLB=p(-h, y1, -h);
  const BRB=p( h, y1, -h);

  // Face inferior (y=−BH) — mais escura
  poly([BRF,BLF,BLB,BRB], CBASE_BOT, '#504840', 0.8, 0.9);
  // Faces laterais
  poly([TRF,BRF,BRB,TRB], CBASE_SIDE, '#504840', 0.7, 0.9); // direita
  poly([TLF,BLF,BRF,TRF], CBASE_SIDE, '#504840', 0.7, 0.9); // frente
  poly([TLB,BLB,BLF,TLF], CBASE_SIDE, '#504840', 0.7, 0.9); // esquerda
  poly([TRB,BRB,BLB,TLB], CBASE_SIDE, '#504840', 0.7, 0.9); // trás
  // Face superior (y=0) — mais clara, tênue para não obscurecer a origem
  poly([TRF,TLF,TLB,TRB], CBASE_TOP, '#706860', 0.8, 0.85);
}

// ═══════════════════════════════════════════════════════
// COLUNA — seção 0.1L × 0.1L, altura 0.6L
// Tangencia borda +X da base → x de +0.4L a +0.5L
// Contida no plano XY       → z de −0.05L a +0.05L
// de y=0 até y=0.6L
// ═══════════════════════════════════════════════════════
const CS  = 0.10 * L;   // lado da seção
const CH  = 0.60 * L;   // altura
const CX1 = L/2 - CS;   // face interna em X = +0.4L
const CX2 = L/2;        // face externa em X = +0.5L
const CZ1 = -CS/2;      // −0.05L
const CZ2 = +CS/2;      // +0.05L

function drawShaft(proj,S,cx,cy){
  const p=(x,y,z)=>proj(x,y,z,S,cx,cy);
  const y0=0, y1=CH;

  const TRF=p(CX2,y1,CZ2), TLF=p(CX1,y1,CZ2);
  const TLB=p(CX1,y1,CZ1), TRB=p(CX2,y1,CZ1);
  const BRF=p(CX2,y0,CZ2), BLF=p(CX1,y0,CZ2);
  const BLB=p(CX1,y0,CZ1), BRB=p(CX2,y0,CZ1);

  poly([TLB,BLB,BRB,TRB], '#8050a0','#603080',0.8,0.9);  // face −Z
  poly([TLF,BLF,BLB,TLB], '#9060b0','#603080',0.8,0.92); // face −X
  poly([TRF,BRF,BLF,TLF], '#b070c0','#603080',0.8,0.92); // face +Z
  poly([TRB,BRB,BRF,TRF], '#a060b8','#603080',0.8,0.92); // face +X
  poly([TRF,TLF,TLB,TRB], '#d090e0','#603080',0.8,0.95); // topo
}

// ═══════════════════════════════════════════════════════
// CILINDRO — diâmetro 0.05L, comprimento 0.1L, paralelo a X
// Tangente à face interna da coluna (x = CX1 = +0.4L)
//   → centro em x = CX1 − raio = 0.4L − 0.025L = 0.375L
// Topo da coluna: y = CH = 0.6L  → centro em y = CH
// Centrado em Z = 0
// Comprimento em X: de x = 0.375L − 0.05L a x = 0.375L + 0.05L
// ═══════════════════════════════════════════════════════
const CRAD  = 0.025 * L;
const CLEN  = 0.10  * L;
const CCX   = CX1 - CRAD;   // centro X do cilindro = 0.375L
const CCY   = CH;            // centro Y = 0.6L
const CCZ   = 0;
const CSEG  = 24;
const xA_dim = CCX - CLEN/2;
const xB_dim = CCX + CLEN/2;

// Plano X'Z' e semi-anel
const YP2    = CH;               // y do plano X'Z' = 0.6L
const SR_OUT = CCX;              // raio externo = 0.375L (alcança o eixo Z')
const SR_IN  = SR_OUT - 0.01*L; // raio interno = 0.365L
const SR_SEG = 48;               // segmentos do arco

function drawCylinder(proj,S,cx,cy){
  const p=(x,y,z)=>proj(x,y,z,S,cx,cy);
  const xA = xA_dim;
  const xB = xB_dim;

  // Círculo da seção transversal (no plano YZ) parametrizado:
  //   y = CCY + CRAD*cos(t),  z = CCZ + CRAD*sin(t)
  // Geramos os pontos dos dois discos e o tubo lateral

  // Pontos do disco A (x=xA) e B (x=xB)
  const discA=[], discB=[];
  for(let i=0;i<=CSEG;i++){
    const t=(i/CSEG)*Math.PI*2;
    const dy=CRAD*Math.cos(t), dz=CRAD*Math.sin(t);
    discA.push(p(xA, CCY+dy, CCZ+dz));
    discB.push(p(xB, CCY+dy, CCZ+dz));
  }

  // Corpo lateral (quad strips) — dividido em metade inferior e superior
  // para simular sombreamento
  for(let i=0;i<CSEG;i++){
    const t=(i/CSEG)*Math.PI*2;
    const bright = 0.5 + 0.5*Math.cos(t);   // 0=escuro, 1=claro
    const r=Math.round(140+80*bright);
    const g=Math.round(100+60*bright);
    const b=Math.round(160+80*bright);
    const col=`rgb(${r},${g},${b})`;
    poly([discA[i],discA[i+1],discB[i+1],discB[i]], col, '#604880', 0.6, 0.93);
  }

  // Disco A (esquerda, −X) — mais escuro
  ctx.save(); ctx.globalAlpha=0.88;
  ctx.beginPath();
  discA.forEach(([px2,py2],i)=>i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2));
  ctx.closePath();
  ctx.fillStyle='#7050a0'; ctx.strokeStyle='#604880'; ctx.lineWidth=0.8;
  ctx.fill(); ctx.stroke(); ctx.restore();

  // Disco B (direita, +X) — mais claro
  ctx.save(); ctx.globalAlpha=0.92;
  ctx.beginPath();
  discB.forEach(([px2,py2],i)=>i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2));
  ctx.closePath();
  ctx.fillStyle='#c090e0'; ctx.strokeStyle='#604880'; ctx.lineWidth=0.8;
  ctx.fill(); ctx.stroke(); ctx.restore();
}
// ═══════════════════════════════════════════════════════
// PLANO X'Z' — paralelo a XZ em y = YP2 = 0.6L
// ═══════════════════════════════════════════════════════
function drawPlaneXpZp(proj,S,cx,cy){
  const p=(x,y,z)=>proj(x,y,z,S,cx,cy);
  const y=YP2, ext=0.65*L;
  const verts=[p(ext,y,ext),p(-ext,y,ext),p(-ext,y,-ext),p(ext,y,-ext)];
  ctx.save(); ctx.globalAlpha=0.12;
  ctx.beginPath(); ctx.moveTo(verts[0][0],verts[0][1]);
  verts.forEach(([x2,y2])=>ctx.lineTo(x2,y2)); ctx.closePath();
  ctx.fillStyle='#c8b890'; ctx.fill(); ctx.restore();
  ctx.save(); ctx.globalAlpha=0.45; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(verts[0][0],verts[0][1]);
  verts.forEach(([x2,y2])=>ctx.lineTo(x2,y2)); ctx.closePath();
  ctx.strokeStyle='#a09060'; ctx.lineWidth=0.9; ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  const [lx,ly]=p(ext*0.72,y,-ext*0.72);
  ctx.save(); ctx.globalAlpha=0.6;
  ctx.font="8px 'Space Mono'"; ctx.fillStyle='#a09060';
  ctx.fillText("X'Z'",lx,ly); ctx.restore();
  // Eixo Z' (x=0 no plano X'Z')
  const [z1x,z1y]=p(0,y,-ext*0.7),[z2x,z2y]=p(0,y,ext*0.7);
  ctx.save(); ctx.globalAlpha=0.5; ctx.setLineDash([3,4]);
  ctx.beginPath(); ctx.moveTo(z1x,z1y); ctx.lineTo(z2x,z2y);
  ctx.strokeStyle='#7de052'; ctx.lineWidth=1.2; ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  const [zlx,zly]=p(0,y,ext*0.73);
  ctx.save(); ctx.globalAlpha=0.65;
  ctx.font="8px 'Space Mono'"; ctx.fillStyle='#7de052';
  ctx.fillText("Z'",zlx,zly); ctx.restore();
}

// ═══════════════════════════════════════════════════════
// SEMI-ANEL CINZA — no plano X'Z' (y = YP2 = 0.6L)
// Centro em (0, YP2, 0) — na origem do plano X'Z'
// Arco 180° pelo lado +X: θ ∈ [−π/2, +π/2]
//   x = R·cos(θ),  z = R·sin(θ),  y = YP2
//   θ=−π/2 → (0, YP2, −R)  extremidade −Z'
//   θ= 0   → (R, YP2,  0)  engaste no cilindro
//   θ=+π/2 → (0, YP2, +R)  extremidade +Z'
// ═══════════════════════════════════════════════════════
function drawSemiRingGray(proj,S,cx,cy){
  const p=(x,y,z)=>proj(x,y,z,S,cx,cy);
  const Rm=(SR_OUT+SR_IN)/2;

  function arcPt(theta, radius){
    return p(radius*Math.cos(theta), YP2, radius*Math.sin(theta));
  }

  // Fill
  ctx.save();
  ctx.globalAlpha=0.88;
  ctx.beginPath();
  for(let i=0;i<=SR_SEG;i++){
    const theta=-Math.PI/2+(i/SR_SEG)*Math.PI;
    const [px2,py2]=arcPt(theta,SR_OUT);
    i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
  }
  for(let i=SR_SEG;i>=0;i--){
    const theta=-Math.PI/2+(i/SR_SEG)*Math.PI;
    const [px2,py2]=arcPt(theta,SR_IN);
    ctx.lineTo(px2,py2);
  }
  ctx.closePath();
  ctx.fillStyle='#8a9ab0';
  ctx.fill();
  ctx.restore();

  // Borda externa
  ctx.save();
  ctx.beginPath();
  for(let i=0;i<=SR_SEG;i++){
    const theta=-Math.PI/2+(i/SR_SEG)*Math.PI;
    const [px2,py2]=arcPt(theta,SR_OUT);
    i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
  }
  ctx.strokeStyle='#5a7090'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.restore();

  // Borda interna
  ctx.save();
  ctx.beginPath();
  for(let i=0;i<=SR_SEG;i++){
    const theta=-Math.PI/2+(i/SR_SEG)*Math.PI;
    const [px2,py2]=arcPt(theta,SR_IN);
    i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
  }
  ctx.strokeStyle='#5a7090'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();

  // Tampas nas extremidades
  ctx.save();
  ctx.strokeStyle='#5a7090'; ctx.lineWidth=2;
  [-Math.PI/2, Math.PI/2].forEach(function(theta){
    const [ax,ay]=arcPt(theta,SR_OUT), [bx,by]=arcPt(theta,SR_IN);
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
  });
  ctx.restore();

  // Rolamentos nas extremidades
  ctx.save();
  [-Math.PI/2, Math.PI/2].forEach(function(theta){
    const [rx,ry]=arcPt(theta,Rm);
    ctx.beginPath(); ctx.arc(rx,ry,5,0,Math.PI*2);
    ctx.fillStyle='#e8d8b0'; ctx.strokeStyle='#8a7a5a'; ctx.lineWidth=1.5;
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(rx,ry,2,0,Math.PI*2);
    ctx.fillStyle='#6a5a4a'; ctx.fill();
  });
  ctx.restore();

  // Ponto de engaste no cilindro
  ctx.save();
  const [ex2,ey2]=arcPt(0,Rm);
  ctx.beginPath(); ctx.arc(ex2,ey2,5,0,Math.PI*2);
  ctx.fillStyle='#c06080'; ctx.strokeStyle='#800040'; ctx.lineWidth=1.5;
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════
let spinAngle = 0;      // graus, pendular invertido (começa indo para -30)
let spinDir   = -1;     // -1 = vai para -30, +1 = volta para 0
let baseAngle = 0;      // rotacao da base em torno de Y (graus)
let ringAngle = 0;      // torcao do semi-anel em torno do eixo do cilindro
let paused    = false;
const STEP_DEG = 0.5;
const MAX_DEG  = 30.0;
const MASS_R   = 0.03 * L;

function reset(){
  spinAngle=0; spinDir=-1; baseAngle=0; ringAngle=0; paused=false;
  document.getElementById('btnPause').textContent='⏸ Pausar';
  var sl=document.querySelector('input[type=range]');
  if(sl){ sl.value=0; document.getElementById('lblBase').textContent='0.0'; }
}
function togglePause(){
  paused=!paused;
  document.getElementById('btnPause').textContent = paused ? '▶ Continuar' : '⏸ Pausar';
}

// ═══════════════════════════════════════════════════════
// PLANO X'Y — plano das massas (z=0 sempre)
// Grade vertical em z=0, mostrando x e y
// ═══════════════════════════════════════════════════════
function drawPlaneXpY(proj,S,cx,cy){
  const p=(x,y,z)=>proj(x,y,z,S,cx,cy);
  const ext=0.65*L;
  // Vértices do plano z=0: (±ext, YP2±ext, 0)
  const verts=[
    p( ext, YP2+ext, 0), p(-ext, YP2+ext, 0),
    p(-ext, YP2-ext, 0), p( ext, YP2-ext, 0)
  ];
  ctx.save(); ctx.globalAlpha=0.08;
  ctx.beginPath(); ctx.moveTo(verts[0][0],verts[0][1]);
  verts.forEach(function(v){ctx.lineTo(v[0],v[1]);}); ctx.closePath();
  ctx.fillStyle='#4080c0'; ctx.fill(); ctx.restore();
  ctx.save(); ctx.globalAlpha=0.30; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(verts[0][0],verts[0][1]);
  verts.forEach(function(v){ctx.lineTo(v[0],v[1]);}); ctx.closePath();
  ctx.strokeStyle='#4080c0'; ctx.lineWidth=0.8; ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  // Label
  const [lx,ly]=p(ext*0.7, YP2+ext*0.7, 0);
  ctx.save(); ctx.globalAlpha=0.5;
  ctx.font="8px 'Space Mono'"; ctx.fillStyle='#4080c0';
  ctx.fillText("X'Y", lx, ly); ctx.restore();
}

// ═══════════════════════════════════════════════════════
// BINÁRIO
// Eixo de giro = eixo da haste, coincidente com Z', engastado
// nos extremos do semi-anel: (0,YP2,-SR_OUT) e (0,YP2,+SR_OUT).
// As massas giram em torno desse eixo NO PLANO X'Y (z=0).
// Em a=0°: M1=(0, YP2+SR_OUT, 0), M2=(0, YP2-SR_OUT, 0) — alinhadas +Y/-Y.
// SENTIDO INVERTIDO: a negativo = gira para -X primeiro.
// ═══════════════════════════════════════════════════════
function drawBinary(proj,S,cx,cy){
  const p=(x,y,z)=>proj(x,y,z,S,cx,cy);
  const a = spinAngle * Math.PI / 180;  // negativo = sentido invertido

  // Massas no plano X'Y (z=0)
  const M1 = [ SR_OUT*Math.sin(a),  YP2 + SR_OUT*Math.cos(a), 0];
  const M2 = [-SR_OUT*Math.sin(a),  YP2 - SR_OUT*Math.cos(a), 0];
  const [m1x,m1y]=p(...M1), [m2x,m2y]=p(...M2);

  // Mancais (extremos do semi-anel)
  const SUP1=[0, YP2, -SR_OUT], SUP2=[0, YP2, +SR_OUT];
  const [s1x,s1y]=p(...SUP1), [s2x,s2y]=p(...SUP2);

  // Arcos de trajetoria (de 0 a -30 graus = sentido invertido)
  ctx.save(); ctx.globalAlpha=0.20; ctx.setLineDash([3,4]);
  ctx.strokeStyle='#3a7abf'; ctx.lineWidth=1;
  ctx.beginPath();
  for(let i=0;i<=60;i++){
    const t=-(i/60)*MAX_DEG*Math.PI/180;
    const [tx,ty]=p(SR_OUT*Math.sin(t), YP2+SR_OUT*Math.cos(t), 0);
    i===0?ctx.moveTo(tx,ty):ctx.lineTo(tx,ty);
  }
  ctx.stroke();
  ctx.beginPath();
  for(let i=0;i<=60;i++){
    const t=-(i/60)*MAX_DEG*Math.PI/180;
    const [tx,ty]=p(-SR_OUT*Math.sin(t), YP2-SR_OUT*Math.cos(t), 0);
    i===0?ctx.moveTo(tx,ty):ctx.lineTo(tx,ty);
  }
  ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // Conexoes massa-mancal
  ctx.save(); ctx.globalAlpha=0.28;
  ctx.strokeStyle='#8a9ab0'; ctx.lineWidth=1;
  [[m1x,m1y,s1x,s1y],[m1x,m1y,s2x,s2y],
   [m2x,m2y,s1x,s1y],[m2x,m2y,s2x,s2y]].forEach(function(seg){
    ctx.beginPath(); ctx.moveTo(seg[0],seg[1]); ctx.lineTo(seg[2],seg[3]); ctx.stroke();
  });
  ctx.restore();

  // Haste
  ctx.save();
  ctx.beginPath(); ctx.moveTo(m1x,m1y); ctx.lineTo(m2x,m2y);
  ctx.strokeStyle='#5a6a8a'; ctx.lineWidth=3; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();

  // Mancais
  [SUP1,SUP2].forEach(function(pt){
    const [px2,py2]=p(...pt);
    ctx.save();
    ctx.beginPath(); ctx.arc(px2,py2,5,0,Math.PI*2);
    ctx.fillStyle='#e8d8b0'; ctx.strokeStyle='#8a7a5a'; ctx.lineWidth=1.5;
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(px2,py2,2,0,Math.PI*2);
    ctx.fillStyle='#6a5a4a'; ctx.fill();
    ctx.restore();
  });

  // Massas
  [M1,M2].forEach(function(mass){
    const [px2,py2]=p(...mass);
    ctx.save(); ctx.globalAlpha=0.35;
    ctx.beginPath(); ctx.arc(px2,py2,MASS_R*S*2.2,0,Math.PI*2);
    ctx.fillStyle='#f0c060'; ctx.fill(); ctx.restore();
    ctx.save();
    ctx.beginPath(); ctx.arc(px2,py2,MASS_R*S,0,Math.PI*2);
    ctx.fillStyle='#7a5a10'; ctx.strokeStyle='#f0c060';
    ctx.lineWidth=2; ctx.fill(); ctx.stroke(); ctx.restore();
  });

  // Indicador angulo
  const [ox2,oy2]=p(0,YP2,0);
  ctx.save();
  ctx.font="bold 8px 'Space Mono'"; ctx.fillStyle='#5a6a8a';
  ctx.fillText(Math.abs(spinAngle).toFixed(1)+'deg', ox2+8, oy2-5);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// COTA
// ═══════════════════════════════════════════════════════
function drawDim(proj,S,cx,cy,p1w,p2w,label,offset,col){
  col=col||'#7a6e5a';
  var c1=proj(p1w[0],p1w[1],p1w[2],S,cx,cy);
  var c2=proj(p2w[0],p2w[1],p2w[2],S,cx,cy);
  var x1=c1[0],y1=c1[1],x2=c2[0],y2=c2[1];
  var dx=x2-x1,dy=y2-y1,l=Math.hypot(dx,dy);
  if(l<1) return;
  var nx=-dy/l,ny=dx/l;
  var ox=nx*offset,oy=ny*offset;
  ctx.save(); ctx.globalAlpha=0.6; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(x1+ox,y1+oy); ctx.lineTo(x2+ox,y2+oy);
  ctx.strokeStyle=col; ctx.lineWidth=1; ctx.stroke();
  ctx.setLineDash([]);
  [[x1,y1],[x2,y2]].forEach(function(pt){
    ctx.beginPath(); ctx.moveTo(pt[0]+ox,pt[1]+oy);
    ctx.lineTo(pt[0]+ox+nx*5,pt[1]+oy+ny*5);
    ctx.stroke();
  });
  var mx=(x1+x2)/2+ox+nx*8, my=(y1+y2)/2+oy+ny*8;
  ctx.font="7px 'Space Mono'"; ctx.fillStyle=col;
  ctx.fillText(label,mx,my);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// RENDER DE UM QUADRANTE
// ═══════════════════════════════════════════════════════
function renderQ(proj,S,cx,cy,showDims){
  // Peças FIXAS no espaço (não giram com a base)
  drawAxes(proj,S,cx,cy);
  drawBase(proj,S,cx,cy);        // a base SI gira — mas é fina, usamos rotacionada
  drawPlaneXpZp(proj,S,cx,cy);   // plano X'Z' fixo de referência
  drawPlaneXpY(proj,S,cx,cy);    // plano X'Y fixo (confinamento das massas)

  // Peças ACOPLADAS À BASE (giram com baseAngle em torno de Y)
  // Criamos um projector que aplica rotY antes de projetar
  const pRot = mkProj(proj, S, cx, cy);

  drawShaft(pRot,S,cx,cy);
  drawCylinder(pRot,S,cx,cy);
  drawSemiRingGray(pRot,S,cx,cy);
  drawBinary(pRot,S,cx,cy);

  if(showDims){
    drawDim(proj,S,cx,cy, [-L/2,0,L/2], [L/2,0,L/2], 'L', 20);
    drawDim(proj,S,cx,cy, [CX2,0,CZ2], [CX2,CH,CZ2], '0.6L', 16);
    drawDim(proj,S,cx,cy, [CX1,CH,CZ2],[CX2,CH,CZ2], '0.1L', -14);
  }
}

// ═══════════════════════════════════════════════════════
// DRAW — 4 quadrantes
// ═══════════════════════════════════════════════════════
function draw(){
  ctx.clearRect(0,0,W,W);
  [[0,0,'#f5edd8'],[Q,0,'#f2e9d0'],[0,Q,'#f0e6cc'],[Q,Q,'#eee4ca']].forEach(function(q){
    ctx.fillStyle=q[2]; ctx.fillRect(q[0],q[1],Q,Q); grid(q[0],q[1]);
  });
  // Q1 ISO
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,Q,Q); ctx.clip();
  renderQ(pISO,115,Q/2,Q/2+15,true); qtitle('ISO 3D'); ctx.restore();
  // Q2 Vista X
  ctx.save(); ctx.beginPath(); ctx.rect(Q,0,Q,Q); ctx.clip(); ctx.translate(Q,0);
  renderQ(pX,115,Q/2,Q/2+10,false); qtitle('VISTA <- X  (plano YZ)'); ctx.restore();
  // Q3 Vista Y
  ctx.save(); ctx.beginPath(); ctx.rect(0,Q,Q,Q); ctx.clip(); ctx.translate(0,Q);
  renderQ(pY,115,Q/2,Q/2+10,false); qtitle('VISTA v Y  (plano XZ)'); ctx.restore();
  // Q4 Vista Z
  ctx.save(); ctx.beginPath(); ctx.rect(Q,Q,Q,Q); ctx.clip(); ctx.translate(Q,Q);
  renderQ(pZ,115,Q/2,Q/2+10,false); qtitle('VISTA . Z  (plano XY)'); ctx.restore();
  // Divisores
  ctx.strokeStyle='#a89878'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,Q); ctx.lineTo(W,Q); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(Q,0); ctx.lineTo(Q,W); ctx.stroke();
  ctx.beginPath(); ctx.arc(Q,Q,5,0,Math.PI*2); ctx.fillStyle='#a89878'; ctx.fill();
}

function frame(){
  if(!paused){
    spinAngle += spinDir * STEP_DEG;
    if(spinAngle <= -MAX_DEG){ spinAngle=-MAX_DEG; spinDir= 1; }
    if(spinAngle >= 0)        { spinAngle=0;        spinDir=-1; }
  }
  draw();
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
